        <script>document.addEventListener("DOMContentLoaded",function(){const slider=document.querySelector(".slide-o-matic");const slides=document.querySelectorAll(".slide");const totalSlides=slides.length;const status=document.getElementById("carousel-status");let currentIndex=0;let interval;let usingKeyboard=!1;document.addEventListener("keydown",(e)=>{if(["Tab","ArrowLeft","ArrowRight"].includes(e.key))usingKeyboard=!0});document.addEventListener("mousedown",()=>usingKeyboard=!1);document.addEventListener("touchstart",()=>usingKeyboard=!1);const updateSlideAccessibility=()=>{slides.forEach((slide,i)=>{const isActive=i===currentIndex;slide.setAttribute("tabindex",isActive?"0":"-1");slide.setAttribute("aria-hidden",isActive?"false":"true");slide.setAttribute("aria-current",isActive?"true":"false")});if(status)status.textContent=`Slide ${currentIndex + 1} of ${totalSlides}`};const focusActiveSlide=()=>{if(usingKeyboard)slides[currentIndex].focus({preventScroll:!0})};const updateSlidePosition=()=>{requestAnimationFrame(()=>{slider.style.transform=`translate3d(-${100 * currentIndex}%, 0, 0)`;updateSlideAccessibility()})};const nextSlide=()=>{currentIndex=(currentIndex+1)%totalSlides;updateSlidePosition();focusActiveSlide()};const prevSlide=()=>{currentIndex=(currentIndex-1+totalSlides)%totalSlides;updateSlidePosition();focusActiveSlide()};const startCarousel=()=>interval=setInterval(nextSlide,4000);const stopCarousel=()=>clearInterval(interval);slides.forEach((slide)=>{slide.addEventListener("focus",stopCarousel);slide.addEventListener("blur",startCarousel)});let touchStartX=0,touchEndX=0;slider.addEventListener("touchstart",(e)=>touchStartX=e.touches[0].clientX);slider.addEventListener("touchmove",(e)=>touchEndX=e.touches[0].clientX);slider.addEventListener("touchend",()=>{const swipeDistance=touchStartX-touchEndX;if(swipeDistance>50){stopCarousel();nextSlide();startCarousel()}else if(swipeDistance<-50){stopCarousel();prevSlide();startCarousel()}});document.querySelector(".nav-arrow.left").addEventListener("click",()=>{stopCarousel();prevSlide();startCarousel()});document.querySelector(".nav-arrow.right").addEventListener("click",()=>{stopCarousel();nextSlide();startCarousel()});document.addEventListener("keydown",(e)=>{if(e.key==="ArrowLeft"){stopCarousel();prevSlide();startCarousel()}else if(e.key==="ArrowRight"){stopCarousel();nextSlide();startCarousel()}});window.addEventListener("load",()=>{setTimeout(()=>{slider.style.transition="transform 0.5s ease-in-out";updateSlideAccessibility();startCarousel()},100)})});</script>
